name: JARVIS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501

      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: pytest tests/ -v --tb=short

      - name: Notify desktop on success
        if: success() && github.ref == 'refs/heads/main'
        run: |
          echo "Tests passed — deployment complete"
          # plyer notification is sent by the deployed JARVIS instance
          # CI just records the success here

      - name: Notify on failure
        if: failure()
        run: echo "CI failed — check the logs above"
